    .game-btn {

    .game-card.hidden { display: none; }

  <script>
    function openGame(file) {
      const win = window.open('about:blank', '_blank');
      if (file.startsWith('http')) {
        win.location.href = file;
        return;
      }
      fetch(file)
        .then(r => r.text())
        .then(html => {
          win.document.open();
          win.document.write(html);
          win.document.close();
        })
        .catch(() => win.location.href = file);
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    const searchInput = document.getElementById('search-input');
    const cards = document.querySelectorAll('.game-card');
    const countEl = document.getElementById('game-count');
    const noResults = document.getElementById('no-results');

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      let visible = 0;
      cards.forEach(c => {
        const match = c.dataset.name.toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      countEl.innerText = visible + " GAMES LOADED";
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });

    countEl.innerText = cards.length + " GAMES LOADED";
  </script>
