    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      overflow-x: hidden;
      background: #0a0015;

    /* ═══════════════════════════════════════
        GALAXY BACKGROUND
    ═══════════════════════════════════════ */
    #galaxy {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 50% 80%, rgba(60,0,80,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }

    #galaxy::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 15% 25%, rgba(140,0,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 35% 25% at 85% 60%, rgba(0,80,200,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 50% 20% at 60% 10%, rgba(200,50,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 30% 80%, rgba(80,0,180,0.15) 0%, transparent 70%);
      animation: nebulaPulse 12s ease-in-out infinite alternate;
    }
    @keyframes nebulaPulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.3; }
      to   { opacity: 1; }
    }

    /* ═══════════════════════════════════════
        TOP NAV
    ═══════════════════════════════════════ */
    #top-nav {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end; 
      padding: 24px 36px 0;
      width: 100%;
    }

    #search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #search-input {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(180,100,255,0.45);
      border-radius: 30px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 14px 28px;
      width: 300px;
      outline: none;
      transition: 0.3s;
      backdrop-filter: blur(8px);
    }
    #search-input:focus {
      width: 360px;
      border-color: rgba(200,150,255,0.8);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 20px rgba(160,80,255,0.4);
    }

    /* ═══════════════════════════════════════
        HEADER
    ═══════════════════════════════════════ */
    #header {
      position: relative;
      z-index: 10;
      margin-top: 10px;
    }

    #save-reminder {
      font-size: 30px;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 0 15px rgba(180,100,255,0.5), 0 2px 6px rgba(0,0,0,0.8);
    }

    h1 {
      font-size: 52px;
      margin: 0 0 10px;
      text-shadow: 0 0 30px rgba(180,100,255,0.7), 0 2px 8px rgba(0,0,0,0.9);
      cursor: pointer;
      user-select: none;
      display: inline-block;
    }

    #clock {
      font-size: 40px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(180,100,255,0.5), 0 2px 6px rgba(0,0,0,0.8);

    #module-count {
      font-size: 14px;
      color: rgba(200,170,255,0.5);
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    /* ═══════════════════════════════════════
        GRID
    ═══════════════════════════════════════ */
    .modules-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 0 24px 70px;
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    .module-card.hidden { display: none; }

    .module-btn {
      width: 280px;
      padding: 22px;
      font-size: 18px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(8px);
    }
    .module-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      transform: translateY(-4px);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }

    #no-results {
      display: none;
      font-size: 24px;
      color: rgba(255,255,255,0.4);
      margin: 70px 0;
      position: relative;
      z-index: 10;
    }

  <script>
    function generateStars() {
      var galaxy = document.getElementById('galaxy');
      for (var i = 0; i < 150; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        galaxy.appendChild(star);
      }
    }
    generateStars();

    function openModule(file) {
      var win = window.open('about:blank', '_blank');
      if (file.startsWith('http')) {
        win.location.href = file;
        return;
      }
      fetch(file)
        .then(function(r) { return r.text(); })
        .then(function(html) {
          win.document.open();
          win.document.write(html);
          win.document.close();
        })
        .catch(function() {
          win.location.href = file;
        });
    }

    function goHome() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById('search-input').value = '';
      document.querySelectorAll('.module-card').forEach(function(c) {
        c.classList.remove('hidden');
      });
      document.getElementById('module-count').textContent =
        document.querySelectorAll('.module-card').length + ' MODULES LOADED';
      document.getElementById('no-results').style.display = 'none';
    }

    function updateClock() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerText =
        (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── SEARCH LOGIC ──
    var cards = document.querySelectorAll('.module-card');
    var countEl = document.getElementById('module-count');
    var noResults = document.getElementById('no-results');
    countEl.textContent = cards.length + ' MODULES LOADED';

    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      var visible = 0;
      cards.forEach(function(c) {
        // Searches by both the hidden "data-name" (game name) and the button text (math name)
        var match = !q || c.getAttribute('data-name').toLowerCase().includes(q) || 
                         c.innerText.toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
      countEl.textContent = q ? visible + ' MATCHES FOUND' : cards.length + ' MODULES LOADED';
    });
  </script>
