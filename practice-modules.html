  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      background: #0a0015;
    }

    #galaxy {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

    #top-nav {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: flex-end; 
      padding: 24px 36px 0;
    }

    #search-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px; /* Less "fancy" looking */
      color: #fff;
      font-size: 16px;
      padding: 10px 15px;
      width: 250px;
      outline: none;
      backdrop-filter: blur(8px);
    }

    #header { position: relative; z-index: 10; margin-top: 10px; }
    #save-reminder { font-size: 24px; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
    h1 { font-size: 48px; margin-bottom: 10px; cursor: pointer; }
    #clock { font-size: 32px; margin-bottom: 10px; opacity: 0.8; }
    #module-count { font-size: 12px; color: rgba(200,170,255,0.4); margin-bottom: 40px; }

    .modules-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 35px; /* Wider gap for "misplaced" look */
      padding: 20px 24px 100px;
      position: relative;
      z-index: 10;
      max-width: 1300px;
      margin: 0 auto;
    }

    .module-card.hidden { display: none; }

    /* Misplaced Button Styles */
    .module-btn {
      width: 320px;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      background: #1e293b; /* Solid Navy Blue */
      color: #cbd5e1;
      cursor: pointer;
      transition: transform 0.2s;
      text-align: left;
      /* Randomization via nth-child classes below */
    }

    .module-btn:hover {
      background: #334155;
      color: #fff;
      transform: scale(1.02) !important; /* Override the "misplaced" tilt on hover */
    }

    /* Manually adding some "out of place" offsets */
    .module-card:nth-child(odd) .module-btn { transform: rotate(-1.5deg) translateY(10px); }
    .module-card:nth-child(even) .module-btn { transform: rotate(1deg) translateX(-5px); }
    .module-card:nth-child(3n) .module-btn { transform: translateY(-15px) rotate(0.5deg); margin-left: 20px; }
    .module-card:nth-child(4n) .module-btn { transform: rotate(-0.8deg); margin-right: 15px; }

    #no-results { display: none; font-size: 20px; color: grey; margin-top: 50px; }
  </style>
</head>
