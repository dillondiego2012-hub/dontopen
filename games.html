<!DOCTYPE html>
<html>
<head>
  <title>My Game Site</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
    }

    h1 {
      color: white;
      font-size: 50px;
      margin-bottom: 10px;
    }

    /* Main Games Button */
    .games-btn {
      padding: 25px 50px;
      font-size: 28px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transition: 0.3s;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .games-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    /* Game Selection Container (hidden by default) */
    .game-menu {
      display: none;
      flex-direction: column;
      gap: 15px;
      animation: fadeIn 0.5s ease;
    }

    .game-menu.active {
      display: flex;
    }

    /* Geometry Dash Button */
    .gd-btn {
      padding: 20px 40px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      transition: 0.3s;
      box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
    }

    .gd-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 35px rgba(245, 87, 108, 0.6);
    }

    /* Back Button */
    .back-btn {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #334155;
      color: white;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #475569;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
<base target="_blank">
</head>
<body>

  <h1>🎮 Game Portal</h1>

  <!-- Main Menu -->
  <div id="mainMenu">
    <button class="games-btn" onclick="showGames()">🎯 Games</button>
  </div>

  <!-- Game Selection Menu (hidden initially) -->
  <div id="gameMenu" class="game-menu">
    <button class="gd-btn" onclick="openGeometryDash()">⬜ Geometry Dash</button>
    <button class="back-btn" onclick="showMain()">⬅ Back</button>
  </div>

  <script>
    // Geometry Dash HTML content (embedded from your txt file)
    const gdHTML = `<!DOCTYPE html>
<html lang="en-US">
<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/">
  <title>Geometry Dash</title>
  <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
  <meta name="description" content="Play Geometry Dash Lite Online For Free">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    body {
      margin: 0;
      background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
      overflow: hidden;
    }
    #gameContainer { width: 100vw; height: 100vh; }
    canvas { width: 100%; height: 100%; display: block; }
    canvas+* { z-index: 2; }
    .container { max-width: 1600px; position: relative; }
    .posImg { position: absolute; top: 0; width: 100%; height: 100%; }
    .logo { position: absolute; display: block; max-width: 100vw; max-height: 70vh; top: 300px; }
    .pos_progress { position: absolute; bottom: 15%; width: 100%; }
    .progress { margin: 1.5em auto; max-width: 436px; height: auto; display: none; position: relative; }
    .full { width: 97%; transform-origin: top left; }
    .box_process { width: 100%; }
    .process { width: 98%; }
    .progress .posfull, .progress .posbox { position: absolute; display: flex; align-items: center; justify-content: center; }
    .progress .posfull { top: 8px; z-index: 1; }
    .progress .posbox { top: 0; z-index: 2; }
    #loader { position: absolute; left: 0; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255)); }
    .pos_spinner { position: absolute; top: 70%; left: 50%; transform: translate(-30%, -50%); }
    .spinner, .spinner:after { display: none; border-radius: 50%; width: 5em; height: 5em; }
    .spinner { margin: 10px; font-size: 10px; position: relative; text-indent: -9999em; border-top: 1.1em solid rgba(255, 255, 255, 0.2); border-right: 1.1em solid rgba(255, 255, 255, 0.2); border-bottom: 1.1em solid rgba(255, 255, 255, 0.2); border-left: 1.1em solid #ffffff; transform: translateZ(0); animation: spinner-spin 1.1s infinite linear; }
    @keyframes spinner-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
  <div id="loader"><img class="logo" src="image/loading.png?v=1">
    <div class="spinner"></div>
    <div class="pos_progress">
      <div class="progress">
        <div class="posfull"><img class="full" src="image/process_bar_back.png"></div>
        <div class="posbox"><img class="box_process" src="image/process_bar_front.png"></div>
      </div>
    </div>
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'GeometryDashLite.data.unityweb', parts: 2 },
          { name: 'GeometryDashLite.wasm.code.unityweb', parts: 1 },
          { name: 'GeometryDashLite.wasm.framework.unityweb', parts: 1 },
        ],
        basePath: 'Build/',
        debug: true
      };
    <\/script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ac5cdfc0042aca584e72619375b4aca948a9243c/merge.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", { onProgress: UnityProgress });
      function UnityProgress(gameInstance, progress) {
        if (!gameInstance.Module) { return; }
        const loader = document.querySelector("#loader");
        if (!gameInstance.progress) {
          const progress = document.querySelector("#loader .progress");
          progress.style.display = "block";
          gameInstance.progress = progress.querySelector(".full");
          loader.querySelector(".spinner").style.display = "none";
        }
        gameInstance.progress.style.transform = \`scaleX(\${progress})\`;
        if (progress === 1 && !gameInstance.removeTimeout) {
          gameInstance.removeTimeout = setTimeout(function() { loader.style.display = "none"; }, 2000);
        }
      }
    <\/script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        let buttondiv = document.getElementsByTagName('button');
        for (let i = 0; i < buttondiv.length; i++) {
          if (buttondiv[i].innerHTML == "OK") { buttondiv[i].click(); }
        }
        setTimeout(function() {
          let buttonok = document.getElementsByTagName('button');
          for (let i = 0; i < buttondiv.length; i++) {
            if (buttonok[i].innerHTML == "OK") { buttonok[i].click(); }
          }
        }, 1000);
      });
    <\/script>
  </div>
</body>
</html>`;

    function showGames() {
      document.getElementById('mainMenu').style.display = 'none';
      document.getElementById('gameMenu').classList.add('active');
    }

    function showMain() {
      document.getElementById('gameMenu').classList.remove('active');
      document.getElementById('mainMenu').style.display = 'block';
    }

    function openGeometryDash() {
      // Open about:blank and write the GD HTML
      const newWindow = window.open('about:blank', '_blank');
      if (newWindow) {
        newWindow.document.write(gdHTML);
        newWindow.document.close();
      } else {
        alert('Please allow popups to play Geometry Dash!');
      }
    }
  </script>

</body>
</html>
